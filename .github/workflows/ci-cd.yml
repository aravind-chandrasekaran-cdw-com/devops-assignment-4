name: CI-CD Pipeline
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies and build up
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Build artifact
        uses: actions/upload-artifact@v4
        with:
          name: React build artifacts
          path: ./dist

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: download build artifact
        uses: actions/download-artifact@v4
        with:
          name: React build artifacts
          path: dist

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Validate build
        run: |
          test -f dist/index.html
          echo "Build artifact is valid."

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: React build artifacts
          path: dist

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-assignment-4:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref_name == 'main' && 'main' || 'dev' }}

    steps:
      - name: Print variables
        run: |
          echo "Deploy target: ${{ github.ref_name }}"
          echo "API_URL=${{ vars.API_URL }}"
          echo "DB_NAME=${{ vars.DB_NAME }}"
